services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: africhess
      POSTGRES_USER: africhess
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-africhess_dev_pg}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U africhess -d africhess"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-africhess_redis_dev}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-africhess_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/app/docker-entrypoint.sh"]
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=db
      - POSTGRES_DB=africhess
      - POSTGRES_USER=africhess
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-africhess_dev_pg}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-africhess_redis_dev}@redis:6379/0
      - SECRET_KEY=dev-local-docker-compose-secret-key-minimum-fifty-characters-long
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - WS_ALLOW_QUERY_TOKEN=false
      - PREMIUM_DEMO_ALLOWED=true
      - ALLOW_PUBLIC_API_DOCS=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "mkdir -p staticfiles && celery -A config worker -l info"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-africhess_dev_pg}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-africhess_redis_dev}@redis:6379/0
    depends_on:
      - backend
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "mkdir -p staticfiles && celery -A config beat -l info"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-africhess_redis_dev}@redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_DIST_DIR=.next
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
